<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="lemonBody" x1="20%" y1="10%" x2="85%" y2="95%">
      <stop offset="0%" stop-color="#f5e37f"/>
      <stop offset="55%" stop-color="#e8cf4f"/>
      <stop offset="100%" stop-color="#d0b430"/>
    </linearGradient>
    <radialGradient id="lemonGloss" cx="35%" cy="28%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- leaf -->
  <g transform="translate(66,14) rotate(28)">
    <path d="M0 0 C 10 -3, 19 3, 21 13 C 10 13, 1 9, 0 0 Z" fill="#7fae5a"/>
    <path d="M0 0 C 8 2, 15 7, 20 12" stroke="#5f8f43" stroke-width="1" fill="none" opacity="0.6"/>
  </g>

  <!-- lemon body: ellipse with slight points at each end -->
  <path d="M60 16
           C 82 16, 100 34, 102 58
           C 103 62, 108 62, 108 64
           C 108 66, 103 66, 102 68
           C 100 92, 82 110, 60 110
           C 38 110, 20 92, 18 68
           C 17 66, 12 66, 12 64
           C 12 62, 17 62, 18 58
           C 20 34, 38 16, 60 16 Z"
        fill="url(#lemonBody)" stroke="#c7a828" stroke-width="1"/>

  <!-- texture dots -->
  <g fill="#c7a828" opacity="0.35">
    <circle cx="45" cy="40" r="1.4"/>
    <circle cx="63" cy="34" r="1.2"/>
    <circle cx="78" cy="46" r="1.3"/>
    <circle cx="40" cy="58" r="1.1"/>
    <circle cx="70" cy="60" r="1.4"/>
    <circle cx="55" cy="72" r="1.2"/>
    <circle cx="82" cy="70" r="1.1"/>
    <circle cx="48" cy="88" r="1.3"/>
    <circle cx="68" cy="90" r="1.1"/>
    <circle cx="35" cy="75" r="1.2"/>
  </g>

  <!-- gloss highlight -->
  <ellipse cx="42" cy="42" rx="20" ry="16" fill="url(#lemonGloss)"/>
</svg>
